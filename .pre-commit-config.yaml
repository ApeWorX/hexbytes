exclude: '.project-template|docs/conf.py'
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-yaml
    -   id: check-toml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
-   repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
    -   id: pyupgrade
        args: [--py310-plus]
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.6
    hooks:
    -   id: ruff-check
        args: [--fix]
    -   id: ruff-format
-   repo: https://github.com/executablebooks/mdformat
    rev: 0.7.17
    hooks:
    -   id: mdformat
        additional_dependencies:
        -   mdformat-gfm
-   repo: local
    hooks:
    -   id: mypy-local
        name: run mypy with all dev dependencies present
        entry: uv run --group lint --group test mypy hexbytes
        language: system
        always_run: true
        pass_filenames: false
-   repo: https://github.com/PrincetonUniversity/blocklint
    rev: v0.2.5
    hooks:
    -   id: blocklint
        exclude: 'docs/Makefile|docs/release_notes.rst'
-   repo: local
    hooks:
    -   id: check-rst-files
        name: Check for .rst files in the top-level directory
        entry: sh -c 'ls *.rst 1>/dev/null 2>&1 && { echo "found .rst file in top-level folder"; exit 1; } || exit 0'
        language: system
        always_run: true
        pass_filenames: false
